workflows:
  android-preview:
    name: Android App Preview
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      vars:
        SIRATI_API_BASE_URL: "https://sirati-main-shokc5.laravel.cloud/api"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze
        script: flutter analyze

      - name: Run tests
        script: flutter test

      - name: Build Android debug APK for App Preview
        script: |
          flutter build apk --debug \
            --dart-define=SIRATI_API_BASE_URL=$SIRATI_API_BASE_URL

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  ios-preview:
    name: iOS Simulator App Preview
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      vars:
        SIRATI_API_BASE_URL: "https://sirati-main-shokc5.laravel.cloud/api"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze
        script: flutter analyze

      - name: Run tests
        script: flutter test

      - name: Build iOS simulator app for App Preview
        script: |
          flutter build ios --simulator --debug \
            --dart-define=SIRATI_API_BASE_URL=$SIRATI_API_BASE_URL

    artifacts:
      - build/ios/iphonesimulator/Runner.app