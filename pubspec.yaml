name: sirati
description: CV analysis and generation app powered by Sirati backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: '>=0.19.0 <0.21.0'

  # HTTP client for Laravel backend API calls
  http: ^1.2.0

  # File picker for CV upload (PDF/TXT)
  file_picker: ^8.0.0

  # Open URLs (PDF download, share links)
  url_launcher: ^6.3.0

  # Share CV as PDF
  share_plus: ^9.0.0

  # Google Sign-In
  google_sign_in: ^6.2.0

  # Apple Sign-In (iOS only)
  sign_in_with_apple: ^6.1.0

  # Secure token storage
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
